version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: masala_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: masala123
      MYSQL_DATABASE: masaladb
      MYSQL_USER: masala
      MYSQL_PASSWORD: masala123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
        - NEXT_PUBLIC_SHOP_NAME=${NEXT_PUBLIC_SHOP_NAME}
        - NEXT_PUBLIC_SHOP_ADDRESS=${NEXT_PUBLIC_SHOP_ADDRESS}
        - NEXT_PUBLIC_SHOP_PHONE=${NEXT_PUBLIC_SHOP_PHONE}
    container_name: masala_app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
      - NEXT_PUBLIC_SHOP_NAME=${NEXT_PUBLIC_SHOP_NAME}
      - NEXT_PUBLIC_SHOP_ADDRESS=${NEXT_PUBLIC_SHOP_ADDRESS}
      - NEXT_PUBLIC_SHOP_PHONE=${NEXT_PUBLIC_SHOP_PHONE}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: masala_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
